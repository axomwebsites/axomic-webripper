<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>axom webcloner</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@vibrant/color@4.4.2/dist/vibrant.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
</head>
<body>
<div class="mainwrapper">
  <div class="card">
    <div class="moderow">
      <button id="linkmodebtn" class="modebutton active">by link</button>
      <button id="imagemodebtn" class="modebutton">by images</button>
    </div>

    <div id="linkpanel" class="panel">
      <div class="linkgroup">
        <input type="text" id="websiteurl" placeholder="https://example.com/article">
        <button id="executelinkcopy" class="actionbutton">clone web</button>
      </div>
      <div class="filezone">axom webcloner | copy any website </div>
    </div>

    <div id="imagepanel" style="display:none;" class="panel">
      <div class="filezone">
        <label>upload website screenshot (jpg, png, webp)</label>
        <input type="file" id="imagefileinput" accept="image/jpeg,image/png,image/webp">
        <button id="executeimageextract" class="actionbutton" style="margin-top: 1rem;">clone by image</button>
      </div>
      <div class="filezone" style="background:#fef7e0;">in "by images",it extracts text, color blocks, gradients, shapes (basic)</div>
    </div>
  </div>

  <div class="card">
    <div class="previewtitle">output</div>
    <div class="togglewrapper">
      <button id="previewviewbtn" class="togglebtn activeview">preview</button>
      <button id="codeviewbtn" class="togglebtn">source code</button>
    </div>
    <div id="outputzone" class="outputarea">
      <div class="infomessage">select mode and run copy</div>
    </div>
    <div class="buttonbar">
      <button id="copyoutputbtn" class="actionbutton">copy output</button>
      <button id="previewoutputbtn" class="actionbutton">open in new tab</button>
    </div>
  </div>
</div>
<script src="linkclone.js"></script>
<script src="imageclone.js"></script>
<script src="main.js"></script>
</body>
</html>
